# Directorio de configuración kubectl para el usuario rocky
k8s_kubeconfig_user: "rocky"
k8s_kubeconfig_dir:  "/home/rocky/.kube"

# Manifest de Flannel CNI
k8s_flannel_manifest: "https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml"