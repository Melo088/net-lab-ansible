[defaults]
inventory          = inventory/hosts.ini
roles_path         = roles
private_key_file=~/.ssh/ansible_lab
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = ansible.builtin.default
interpreter_python = auto_silent

[callback_default]
result_format = yaml

[privilege_escalation]
become       = True
become_method = sudo